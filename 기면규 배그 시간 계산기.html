<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김현규 배그 시간 계산기</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:'맑은 고딕',sans-serif;
    text-align:center;
    padding-top:80px;
}

h1{
    font-size:48px;
}

#time{
    font-size:72px;
    color:#00ff88;
    margin:40px 0;
    font-weight:bold;
}

button{
    font-size:28px;
    padding:20px 40px;
    margin:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#shout{
    margin-top:30px;
    font-size:42px;
    color:yellow;
    font-weight:bold;
    min-height:60px;
}

.info{
    color:#aaa;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>🎮 김현규 배그 시간 계산기 🎮</h1>

<div id="time">불러오는 중...</div>

<button onclick="pubg()">
    김현규가 배그라고 외침
</button>

<button onclick="resetData()">
    초기화
</button>

<div id="shout"></div>

<div class="info">
    서버에 저장되며 모든 접속자와 공유됩니다.
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6XBtirZz_D0TZAneuxVALi9wsNIhElcM",
  authDomain: "myeongyu-time.firebaseapp.com",
  databaseURL: "https://myeongyu-time-default-rtdb.firebaseio.com",
  projectId: "myeongyu-time",
  storageBucket: "myeongyu-time.firebasestorage.app",
  messagingSenderId: "897386414303",
  appId: "1:897386414303:web:d4df2dff14e3fce31ae96a",
  measurementId: "G-J24ZE8NJ2G"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "pubgHours");

let hours = 0;

// 실시간 동기화
onValue(counterRef, (snapshot) => {

    if(snapshot.exists()){
        hours = snapshot.val();
    }else{
        hours = 0;
    }

    updateDisplay();
});

// 배그 버튼
window.pubg = async function(){

    hours += 50000;

    await set(counterRef, hours);

    document.getElementById("shout").innerText =
        "🔥 배그라고!!! 🔥";

    setTimeout(()=>{
        document.getElementById("shout").innerText = "";
    },1500);
};

// 초기화 버튼
window.resetData = async function(){

    if(confirm("정말 초기화하시겠습니까?")){

        hours = 0;

        await set(counterRef, 0);

        document.getElementById("shout").innerText =
            "초기화 완료";
    }
};

// 화면 갱신
function updateDisplay(){

    document.getElementById("time").innerText =
        hours.toLocaleString() + " 시간";
}

</script>

</body>
</html>
