<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김현규 배그 시간 계산기</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:'맑은 고딕',sans-serif;
    text-align:center;
    padding-top:80px;
}

h1{
    font-size:48px;
}

#time{
    font-size:72px;
    color:#00ff88;
    margin:40px 0;
    font-weight:bold;
}

button{
    font-size:24px;
    padding:15px 30px;
    margin:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

#shout{
    margin-top:30px;
    font-size:42px;
    color:yellow;
    font-weight:bold;
    min-height:60px;
}

.info{
    color:#aaa;
    margin-top:20px;
}

#nicknameDisplay{
    color:#7ec8ff;
    margin-bottom:20px;
    font-size:20px;
}

#log{
    width:80%;
    max-width:700px;
    margin:30px auto;
    text-align:left;
}

.log-item{
    background:#2a2a2a;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
}

.log-time{
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<h1>🎮 김현규 배그 시간 계산기 🎮</h1>

<div id="nicknameDisplay"></div>

<div id="time">불러오는 중...</div>

<button onclick="pubg()">
    김현규가 배그라고 외침
</button>

<button onclick="changeNickname()">
    닉네임 변경
</button>

<div id="shout"></div>

<div class="info">
    서버에 저장되며 모든 접속자와 공유됩니다.
</div>

<h2>📜 최근 기록</h2>
<div id="log"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  push,
  onValue
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6XBtirZz_D0TZAneuxVALi9wsNIhElcM",
  authDomain: "myeongyu-time.firebaseapp.com",
  databaseURL: "https://myeongyu-time-default-rtdb.firebaseio.com",
  projectId: "myeongyu-time",
  storageBucket: "myeongyu-time.firebasestorage.app",
  messagingSenderId: "897386414303",
  appId: "1:897386414303:web:d4df2dff14e3fce31ae96a",
  measurementId: "G-J24ZE8NJ2G"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "pubgHours");
const logRef = ref(db, "logs");

let hours = 0;

// 닉네임 확인
let nickname = localStorage.getItem("nickname");

if(!nickname){

    nickname = prompt("처음 방문했습니다.\n닉네임을 입력하세요.");

    while(!nickname || nickname.trim() === ""){
        nickname = prompt("닉네임을 입력하세요.");
    }

    nickname = nickname.trim();

    localStorage.setItem("nickname", nickname);
}

updateNicknameDisplay();

// 총 시간 실시간 동기화
onValue(counterRef, (snapshot) => {

    if(snapshot.exists()){
        hours = snapshot.val();
    }else{
        hours = 0;
    }

    updateDisplay();
});

// 최근 기록 실시간 동기화
onValue(logRef, (snapshot) => {

    const logDiv = document.getElementById("log");

    if(!snapshot.exists()){
        logDiv.innerHTML = "기록 없음";
        return;
    }

    const data = snapshot.val();
    const logs = Object.values(data);

    logs.sort((a,b)=>b.time-a.time);

    let html = "";

    logs.slice(0,20).forEach(item=>{

        const date = new Date(item.time);

        html += `
        <div class="log-item">
            <strong>${item.name}</strong> (+${item.amount.toLocaleString()}시간)
            <div class="log-time">
                ${date.toLocaleString()}
            </div>
        </div>
        `;
    });

    logDiv.innerHTML = html;
});

// 배그 버튼
window.pubg = async function(){

    hours += 50000;

    await set(counterRef, hours);

    await push(logRef,{
        name:nickname,
        amount:50000,
        time:Date.now()
    });

    document.getElementById("shout").innerText =
        `🔥 ${nickname}님이 배그라고 외쳤다! 🔥`;

    setTimeout(()=>{
        document.getElementById("shout").innerText = "";
    },1500);
};

// 닉네임 변경
window.changeNickname = function(){

    const newName = prompt("새 닉네임을 입력하세요.");

    if(!newName || newName.trim() === ""){
        return;
    }

    nickname = newName.trim();

    localStorage.setItem("nickname", nickname);

    updateNicknameDisplay();

    alert("닉네임이 변경되었습니다.");
};

function updateNicknameDisplay(){
    document.getElementById("nicknameDisplay").innerText =
        `현재 닉네임 : ${nickname}`;
}

// 화면 갱신
function updateDisplay(){
    document.getElementById("time").innerText =
        hours.toLocaleString() + " 시간";
}

</script>

</body>
</html>
