<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김현규 배그 시간 계산기</title>
<style>
body{background:#1e1e1e;color:white;font-family:'맑은 고딕',sans-serif;text-align:center;padding-top:80px;}
h1{font-size:48px;}
#time{font-size:72px;color:#00ff88;margin:40px 0;font-weight:bold;}
button{font-size:24px;padding:15px 30px;margin:10px;border:none;border-radius:15px;cursor:pointer;}
#shout{margin-top:30px;font-size:42px;color:yellow;font-weight:bold;min-height:60px;}
.info{color:#aaa;margin-top:20px;}
#nicknameDisplay{margin-top:20px;color:#7ec8ff;font-size:20px;}
#log{width:80%;max-width:700px;margin:30px auto;text-align:left;}
.log-item{background:#2a2a2a;padding:12px;margin-bottom:10px;border-radius:10px;}
.log-time{color:#aaa;font-size:12px;}

#patchLog{
    width:80%;
    max-width:700px;
    margin:30px auto;
    text-align:left;
}

.patch-item{
    background:#333;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
}

.patch-time{
    color:#aaa;
    font-size:12px;
}

#patchButton{
    position:fixed;
    top:20px;
    right:20px;

    z-index:999;

    font-size:18px;
    padding:10px 20px;
}

#patchBox{
    position:fixed;
    top:70px;
    right:20px;

    width:400px;
    max-height:600px;

    overflow-y:auto;

    background:#222;

    border:1px solid #555;
    border-radius:10px;

    padding:15px;

    z-index:998;
}

</style>
</head>
<body>

<h1>🎮 김현규 배그 시간 계산기 🎮</h1>

<div id="nicknameDisplay"></div>
<div id="time">불러오는 중...</div>

<button onclick="pubg()">김현규가 배그라고 외침</button>
<button onclick="changeNickname()">닉네임 변경</button>

<div id="adminPanel" style="display:none;margin:20px;">
<h3>🔧 관리자 패널</h3>
<input
    type="number"
    id="incrementInput"
    placeholder="증가량 입력"
    style="padding:10px;width:200px;">

<button onclick="applyIncrement()">
    증가량 적용
</button>
<button onclick="adminReset()">전체 초기화</button>
</div>

<div id="shout"></div>

<div class="info">서버에 저장되며 모든 접속자와 공유됩니다.</div>

<h2>📜 최근 기록</h2>
<div id="log"></div>

<button id="patchButton" onclick="togglePatchLog()">
    🛠 패치내역
</button>

<div id="patchBox" style="display:none;">
    <h2>🛠 패치내역</h2>
    <div id="patchLog"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD6XBtirZz_D0TZAneuxVALi9wsNIhElcM",
  authDomain: "myeongyu-time.firebaseapp.com",
  databaseURL: "https://myeongyu-time-default-rtdb.firebaseio.com",
  projectId: "myeongyu-time",
  storageBucket: "myeongyu-time.firebasestorage.app",
  messagingSenderId: "897386414303",
  appId: "1:897386414303:web:d4df2dff14e3fce31ae96a",
  measurementId: "G-J24ZE8NJ2G"
};

const ADMIN_NAME = "원준식전도시락페스티벌"; // 원하는 비밀 닉네임

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "pubgHours");
const logRef = ref(db, "logs");
const patchLogRef = ref(db, "patchLogs");
const incrementRef = ref(db, "incrementAmount");

let hours = 0;
let incrementAmount = 50000;

let nickname = localStorage.getItem("nickname");
if(!nickname){
    nickname = prompt("닉네임을 입력하세요.");
    while(!nickname || nickname.trim()===""){
        nickname = prompt("닉네임을 입력하세요.");
    }
    nickname = nickname.trim();
    localStorage.setItem("nickname", nickname);
}

function updateNicknameDisplay(){
    const visibleName = nickname === ADMIN_NAME ? "김현규" : nickname;

    document.getElementById("nicknameDisplay").innerText =
        "현재 닉네임 : " + visibleName;

    document.getElementById("adminPanel").style.display =
        nickname === ADMIN_NAME ? "block" : "none";
}
updateNicknameDisplay();

onValue(incrementRef, (snapshot)=>{
    if(snapshot.exists()){
        incrementAmount = snapshot.val();
    }
});

onValue(counterRef, (snapshot)=>{
    hours = snapshot.exists() ? snapshot.val() : 0;
    document.getElementById("time").innerText = hours.toLocaleString() + " 시간";
});

onValue(logRef, (snapshot)=>{
    const logDiv = document.getElementById("log");
    if(!snapshot.exists()){
        logDiv.innerHTML = "기록 없음";
        return;
    }

    const logs = Object.values(snapshot.val()).sort((a,b)=>b.time-a.time);

    logDiv.innerHTML = logs.slice(0,20).map(item=>`
        <div class="log-item">
            <strong>${item.name === ADMIN_NAME ? "김현규" : item.name}</strong> (+${item.amount.toLocaleString()}시간)
            <div class="log-time">${new Date(item.time).toLocaleString()}</div>
        </div>
    `).join("");
});

onValue(patchLogRef, (snapshot)=>{
    const patchDiv = document.getElementById("patchLog");

    if(!snapshot.exists()){
        patchDiv.innerHTML = "패치내역 없음";
        return;
    }

    const patches = Object.values(snapshot.val()).sort((a,b)=>b.time-a.time);

    patchDiv.innerHTML = patches.slice(0,20).map(item=>`
        <div class="patch-item">
            <strong>${item.text}</strong>
            <div class="patch-time">${new Date(item.time).toLocaleString()}</div>
        </div>
    `).join("");
});

window.pubg = async function(){
    const visibleName = nickname === ADMIN_NAME ? "김현규" : nickname;
    hours += incrementAmount;
    await set(counterRef, hours);

    await push(logRef, {
        name:nickname,
        amount:incrementAmount,
        time:Date.now()
    });

    const messages = [
        `${visibleName}이(가) 김현규가 배그라고 외친 걸 들었다!`,
        `${visibleName}: 뭐? 김현규, 배그라고???`,
        `${visibleName}: 김현규 배그 감지`,
        `${visibleName}: 김현규 +${incrementAmount.toLocaleString()}시간 획득!`,
        `${visibleName}: 오늘도 김현규는 배그를 한다.`,
        `김현규의 배그 시간이 증가했다!`
    ];

    const randomMessage = Math.random() < 0.01
      ? `김현규 긴급 체포!`
      : messages[Math.floor(Math.random()*messages.length)];

    document.getElementById("shout").innerText = randomMessage;

    setTimeout(()=>{
        document.getElementById("shout").innerText = "";
    },2000);
};

window.changeNickname = function(){
    const newName = prompt("새 닉네임을 입력하세요.");
    if(!newName || !newName.trim()) return;

    nickname = newName.trim();
    localStorage.setItem("nickname", nickname);
    updateNicknameDisplay();
};

window.setIncrement = function(amount){

    if(nickname !== ADMIN_NAME) return;

    incrementAmount = amount;

    alert("증가량 변경: " + amount.toLocaleString());
};

window.adminReset = async function(){

    if(nickname !== ADMIN_NAME) return;

    if(confirm("전체 시간을 초기화할까요?")){

        await set(counterRef, 0);

        await push(patchLogRef, {
            text: "관리자가 전체 시간을 초기화",
            time: Date.now()
        });

        alert("전체 시간이 초기화되었습니다.");
    }
};

window.applyIncrement = async function(){

    if(nickname !== ADMIN_NAME) return;

    const value =
        Number(document.getElementById("incrementInput").value);

    if(!value || value < 1){
        alert("1 이상의 숫자를 입력하세요.");
        return;
    }

    incrementAmount = value;

    await set(incrementRef, value);

    await push(patchLogRef, {
        text: `관리자가 클릭당 증가량을 ${value.toLocaleString()}시간으로 변경`,
        time: Date.now()
    });

    alert(
        "클릭당 증가량이 " +
        value.toLocaleString() +
        "시간으로 변경되었습니다."
    );
};

window.togglePatchLog = function(){
    const patchBox = document.getElementById("patchBox");

    if(patchBox.style.display === "none"){
        patchBox.style.display = "block";
    }else{
        patchBox.style.display = "none";
    }
};

</script>

</body>
</html>
